<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compressor Acoustic Report</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
:root{
  --bg:#0a0c0f;--s1:#111418;--s2:#181d23;
  --b1:#1e252e;--b2:#2a3340;
  --tx:#e2e8f0;--td:#64748b;--tm:#374151;
  --a1:#00d4ff;--a2:#ff6b35;--a3:#a3e635;--a4:#c084fc;
  --gn:#34d399;--yw:#fbbf24;--rd:#f87171;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh;}
.gbg{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(0,212,255,.025)1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.025)1px,transparent 1px);
  background-size:40px 40px;}

/* UPLOAD */
#up{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;}
.hero{position:relative;z-index:1;text-align:center;max-width:560px;width:100%;}
.logo{width:60px;height:60px;margin:0 auto 1.8rem;border:2px solid var(--a1);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:1.2rem;font-weight:600;color:var(--a1);animation:glow 3s ease-in-out infinite;}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(0,212,255,.15)}50%{box-shadow:0 0 50px rgba(0,212,255,.45)}}
.ut{font-family:var(--mono);font-size:1.8rem;font-weight:300;letter-spacing:-1px;margin-bottom:.4rem;}
.ut span{color:var(--a1);}
.us{color:var(--td);font-size:.82rem;margin-bottom:2.5rem;font-family:var(--mono);}
.dz{border:2px dashed var(--b2);border-radius:4px;padding:2.5rem 2rem;cursor:pointer;transition:all .25s;background:var(--s1);}
.dz:hover,.dz.ov{border-color:var(--a1);background:rgba(0,212,255,.04);}
.dz p{font-family:var(--mono);font-size:.82rem;color:var(--td);}
.dz p strong{color:var(--a1);}
.ftag{display:inline-block;font-family:var(--mono);font-size:.66rem;padding:2px 7px;border:1px solid var(--b2);color:var(--td);border-radius:2px;margin:.5rem .2rem 0;}
#fi{display:none;}
.emsg{margin-top:1rem;font-family:var(--mono);font-size:.76rem;color:var(--rd);display:none;}

/* TOPBAR */
#db{display:none;}
.topbar{background:var(--s1);border-bottom:1px solid var(--b1);padding:0 2rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.tl{font-family:var(--mono);font-size:.8rem;font-weight:600;color:var(--a1);letter-spacing:2px;}
.ts{width:1px;height:16px;background:var(--b2);}
.tt{font-family:var(--mono);font-size:.76rem;color:var(--td);}
.sp{display:flex;align-items:center;gap:.35rem;font-family:var(--mono);font-size:.66rem;color:var(--gn);padding:3px 9px;border:1px solid rgba(52,211,153,.3);border-radius:2px;}
.sd{width:5px;height:5px;border-radius:50%;background:var(--gn);animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.btn{font-family:var(--mono);font-size:.7rem;padding:5px 12px;border:1px solid var(--b2);background:transparent;color:var(--td);cursor:pointer;transition:all .2s;border-radius:2px;}
.btn:hover{border-color:var(--a1);color:var(--a1);}

/* LAYOUT */
.wrap{padding:1.8rem;max-width:1700px;margin:0 auto;}

/* HEADER */
.rhdr{display:grid;grid-template-columns:1fr auto;gap:2rem;margin-bottom:1.8rem;padding:1.4rem;background:var(--s1);border:1px solid var(--b1);border-left:3px solid var(--a1);}
.rid{font-family:var(--mono);font-size:1.4rem;font-weight:300;letter-spacing:-1px;}
.rid span{color:var(--a1);}
.rdesc{font-family:var(--mono);font-size:.78rem;color:var(--td);margin-top:.2rem;}
.rmeta{display:flex;gap:1.6rem;margin-top:.65rem;flex-wrap:wrap;}
.mi{display:flex;flex-direction:column;gap:2px;}
.ml{font-family:var(--mono);font-size:.6rem;color:var(--tm);text-transform:uppercase;letter-spacing:1px;}
.mv{font-family:var(--mono);font-size:.78rem;color:var(--td);}
.conds{display:flex;flex-direction:column;gap:.4rem;align-items:flex-end;}
.crow{display:flex;gap:.5rem;align-items:center;}
.cl{font-family:var(--mono);font-size:.66rem;color:var(--tm);width:105px;text-align:right;}
.cv{font-family:var(--mono);font-size:.78rem;color:var(--a1);min-width:85px;text-align:right;}

/* KPI */
.kgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--b1);border:1px solid var(--b1);margin-bottom:1.8rem;}
.kcard{background:var(--s1);padding:1rem .9rem;display:flex;flex-direction:column;gap:.3rem;transition:background .2s;}
.kcard:hover{background:var(--s2);}
.kl{font-family:var(--mono);font-size:.58rem;color:var(--tm);text-transform:uppercase;letter-spacing:1px;}
.kv{font-family:var(--mono);font-size:1.4rem;font-weight:500;line-height:1;letter-spacing:-1px;}
.ku{font-family:var(--mono);font-size:.64rem;color:var(--td);}
.c1{color:var(--a1)}.c2{color:var(--a2)}.c3{color:var(--a3)}.c4{color:var(--a4)}.c5{color:var(--yw)}.c6{color:var(--gn)}.c7{color:var(--rd)}

/* SECTION TABS */
.tabs{display:flex;gap:0;margin-bottom:1.2rem;border-bottom:1px solid var(--b1);}
.tab{font-family:var(--mono);font-size:.72rem;padding:.6rem 1.2rem;cursor:pointer;color:var(--td);border-bottom:2px solid transparent;transition:all .2s;background:transparent;border-top:none;border-left:none;border-right:none;letter-spacing:.5px;}
.tab:hover{color:var(--tx);}
.tab.active{color:var(--a1);border-bottom-color:var(--a1);}

/* PANELS */
.panel{display:none;}
.panel.active{display:block;}

/* CHARTS */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.cfull{grid-column:1/-1;}
.cc{background:var(--s1);border:1px solid var(--b1);padding:1.3rem;}
.ctit{font-family:var(--mono);font-size:.7rem;color:var(--td);letter-spacing:1px;text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;}
.cbar{width:16px;height:2px;background:var(--a1);display:inline-block;margin-right:7px;vertical-align:middle;}
.cw{position:relative;height:250px;}
.cwt{position:relative;height:300px;}

/* TABLES */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.box{background:var(--s1);border:1px solid var(--b1);padding:1.3rem;}
.box+.box{margin-top:1rem;}
.stit{font-family:var(--mono);font-size:.64rem;color:var(--tm);text-transform:uppercase;letter-spacing:2px;padding:.5rem 0;margin-bottom:.65rem;border-bottom:1px solid var(--b1);}
table.dt{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:.72rem;}
table.dt th{text-align:left;padding:5px 8px;background:var(--s2);color:var(--tm);font-weight:500;border-bottom:1px solid var(--b1);font-size:.6rem;text-transform:uppercase;letter-spacing:1px;}
table.dt td{padding:4px 8px;border-bottom:1px solid var(--b1);color:var(--td);}
table.dt tr:last-child td{border-bottom:none;}
table.dt td.r{color:var(--tx);text-align:right;}
table.dt td.h1{color:var(--a1);font-weight:500;text-align:right;}
table.dt td.h2{color:var(--a2);font-weight:500;text-align:right;}
table.dt td.h3{color:var(--a3);font-weight:500;text-align:right;}
table.dt td.h5{color:var(--yw);font-weight:500;text-align:right;}
table.dt td.ok{color:var(--gn);}
table.dt td.nok{color:var(--rd);}

/* COMPARE */
.cmpbar{background:var(--s1);border:1px solid var(--b1);border-left:3px solid var(--a4);padding:.85rem 1.3rem;margin-bottom:1rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
.chips{display:flex;gap:.4rem;flex-wrap:wrap;flex:1;}
.chip{font-family:var(--mono);font-size:.66rem;padding:2px 8px;border-radius:2px;border:1px solid var(--b2);color:var(--td);display:flex;align-items:center;gap:.3rem;}
.chip.on{border-color:var(--a4);color:var(--a4);}
.cdot{width:5px;height:5px;border-radius:50%;}
.addbtn{font-family:var(--mono);font-size:.68rem;padding:4px 11px;border:1px dashed var(--b2);background:transparent;color:var(--tm);cursor:pointer;border-radius:2px;}
.addbtn:hover{border-color:var(--a4);color:var(--a4);}

.footer{margin-top:1.8rem;padding:.9rem;border-top:1px solid var(--b1);display:flex;justify-content:space-between;}
.ft{font-family:var(--mono);font-size:.6rem;color:var(--tm);}

::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;}
@media(max-width:1200px){.kgrid{grid-template-columns:repeat(4,1fr)}.cgrid{grid-template-columns:1fr}.cfull{grid-column:1}.tgrid{grid-template-columns:1fr}}
@media(max-width:700px){.kgrid{grid-template-columns:repeat(2,1fr)}.rhdr{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="gbg"></div>

<div id="up">
  <div class="hero">
    <div class="logo">CA</div>
    <h1 class="ut">Compressor <span>Acoustic</span><br>Report System</h1>
    <p class="us">// CCS6 .txt → report · no manual steps needed</p>
    <div class="dz" id="dz" onclick="document.getElementById('fi').click()">
      <div style="font-size:2rem;margin-bottom:.7rem;opacity:.3">⬡</div>
      <p><strong>Drop CCS6 .txt files here</strong> or click to select</p>
      <p style="margin-top:.3rem;font-size:.74rem">Multiple files = side-by-side comparison</p>
      <span class="ftag">.txt (CCS6 export)</span>
      <span class="ftag">multiple files</span>
    </div>
    <div class="emsg" id="emsg">⚠ Cannot parse file — check it's a valid CCS6 .txt export</div>
    <input type="file" id="fi" accept=".txt" multiple>
  </div>
</div>

<div id="db">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:1rem">
      <span class="tl">CA//SYS</span><div class="ts"></div><span class="tt" id="tt">—</span>
    </div>
    <div style="display:flex;align-items:center;gap:.8rem">
      <div class="sp"><div class="sd"></div>STABLE</div>
      <button class="btn" onclick="doReset()">⊕ New</button>
    </div>
  </div>
  <div class="wrap" id="wrap"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// PARSER
// ═══════════════════════════════════════════════
function parseCCS6(text) {
  const lines = text.split(/\r?\n/).map(l => l.trimEnd());
  // Header key-value
  const hdr = {};
  let i = 0;
  while (i < lines.length && lines[i] !== 'Data_definition') {
    if (lines[i].trim()) hdr[lines[i].trim()] = (lines[i+1]||'').trim();
    i += 2;
  }
  const ddS = lines.indexOf('Data_definition');
  const ddE = lines.indexOf('End_data_definition');
  const dsS = lines.indexOf('Data_section');
  if (ddS<0||ddE<0||dsS<0) return null;

  const cols = lines.slice(ddS+1, ddE);
  const dlines = lines.slice(dsS+1).filter(l=>l.trim()!=='');
  const nC = cols.length;
  const nM = Math.floor(dlines.length / nC);
  if (!nC||!nM) return null;

  // Parse all measurements
  const measurements = [];
  for (let m=0; m<nM; m++) {
    const obj = {};
    for (let c=0; c<nC; c++) {
      const parts = (dlines[m*nC+c]||'').split(',');
      obj[cols[c]] = { avg: parseFloat(parts[0])||0, max: parseFloat(parts[1])||0, min: parseFloat(parts[2])||0 };
    }
    measurements.push(obj);
  }
  return { hdr, cols, measurements, nM };
}

// Get avg from first measurement
function G(d, key, m=0) {
  const mm = d.measurements[m];
  return mm && mm[key] !== undefined ? mm[key].avg : null;
}
function H(d, key) { return (d.hdr[key]||'').trim()||'—'; }
function F(v, dec=2) {
  if (v===null||v===undefined||isNaN(v)) return '—';
  return parseFloat(v).toFixed(dec);
}

// ═══════════════════════════════════════════════
// 1/3 OCTAVE BAND RSS from harmonics
// ═══════════════════════════════════════════════
const THIRD_BANDS = [6.3,8,10,12.5,16,20,25,31.5,40,50,63,80,100,125,160,200,250,315,400,500,630,800,1000,1250,1600,2000,2500,3150,4000,5000,6300];
const THIRD_LABELS = ['6.3','8','10','12.5','16','20','25','31.5','40','50','63','80','100','125','160','200','250','315','400','500','630','800','1k','1.25k','1.6k','2k','2.5k','3.15k','4k','5k','6.3k'];

function harmonicsTo1_3Oct(d, side) {
  const fund = G(d, 'Fundamental Freq. [Hz]') || 1;
  const prefix = side === 'high' ? 'Pres. Puls., High Side, O' : 'Pres.  Puls., Low Side, O';
  // Collect harmonics: freq → amplitude (bar)
  const harmonics = [];
  for (let n=1; n<=30; n++) {
    const freq = n * fund;
    const val  = G(d, `${prefix}${n} [bar]`) || 0;
    harmonics.push({ n, freq, val });
  }
  // RSS into each 1/3 oct band
  return THIRD_BANDS.map(fc => {
    const lo = fc * Math.pow(2, -1/6);
    const hi = fc * Math.pow(2,  1/6);
    const inBand = harmonics.filter(h => h.freq >= lo && h.freq < hi);
    const rss = Math.sqrt(inBand.reduce((s, h) => s + (h.val*1000)**2, 0)); // mbar
    return rss;
  });
}

// Noise spectrum from txt: Sound Power Level is total only.
// 1/3 octave noise: from xlsm we know bands 100Hz-10kHz.
// In the txt, noise is stored as Sound Power Level [dB(A)] (total).
// There's no per-band noise in the txt — we note this.
const NOISE_BANDS  = [100,125,160,200,250,315,400,500,630,800,1000,1250,1600,2000,2500,3150,4000,5000,6300,8000,10000];
const NOISE_LABELS = ['100','125','160','200','250','315','400','500','630','800','1k','1.25k','1.6k','2k','2.5k','3.15k','4k','5k','6.3k','8k','10k'];

// ═══════════════════════════════════════════════
// UPLOAD
// ═══════════════════════════════════════════════
const CHIP = ['#00d4ff','#ff6b35','#a3e635','#c084fc','#f59e0b','#f87171'];
let allD = [], charts = {};

const dz = document.getElementById('dz');
const fi = document.getElementById('fi');
dz.addEventListener('dragover', e=>{e.preventDefault();dz.classList.add('ov');});
dz.addEventListener('dragleave', ()=>dz.classList.remove('ov'));
dz.addEventListener('drop', e=>{e.preventDefault();dz.classList.remove('ov');load(e.dataTransfer.files);});
fi.addEventListener('change', e=>load(e.target.files));

function load(files) {
  const arr = Array.from(files).filter(f=>f.name.match(/\.txt$/i));
  if (!arr.length) return;
  allD = [];
  Promise.all(arr.map(f=>new Promise(res=>{
    const r = new FileReader();
    r.onload = e=>{
      const p = parseCCS6(e.target.result);
      res(p ? {...p, filename:f.name} : null);
    };
    r.readAsText(f);
  }))).then(results=>{
    allD = results.filter(Boolean);
    if (!allD.length){document.getElementById('emsg').style.display='block';return;}
    document.getElementById('emsg').style.display='none';
    show();
  });
}

function doReset(){
  document.getElementById('up').style.display='flex';
  document.getElementById('db').style.display='none';
  fi.value=''; allD=[];
}

function show(){
  document.getElementById('up').style.display='none';
  document.getElementById('db').style.display='block';
  Object.values(charts).forEach(c=>c.destroy()); charts={};
  const d=allD[0];
  document.getElementById('tt').textContent=`${H(d,'Model')} · ${H(d,'Description').slice(0,40)}`;
  render();
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function render(){
  const d = allD[0];
  const el = document.getElementById('wrap');

  // === Key values ===
  const Lw      = G(d,'Sound Power Level [dB(A)]');
  const LwPeak  = G(d,'Sound Power Max Peak [dB(A)]');
  const Lp      = G(d,'Sound Pressure [dB(A)]');
  const fund    = G(d,'Fundamental Freq. [Hz]');
  const accVec  = G(d,'Acc. Vector Sum [m/s2]');
  const accPeak = G(d,'Acc. Vector, Max Peak [m/s2]');
  const force   = G(d,'Force Vector Sum [N]');
  const pHigh   = G(d,'Pres; Puls, High Side, total');   // bar
  const pLow    = G(d,'Pres.  Puls., Low Side, total');  // bar
  const speed   = G(d,'Speed');
  const voltage = G(d,'Voltage');
  const current = G(d,'Current');
  const tShell  = G(d,'Tshell_Top');
  const tSuct   = G(d,'Tsuction');
  const tAmb    = G(d,'Tambient');
  const pEvap   = G(d,'Pevap');
  const pCond   = G(d,'Pcond');
  const power   = G(d,'Power');
  const pHigh_mbar = pHigh !== null ? pHigh*1000 : null;
  const pLow_mbar  = pLow  !== null ? pLow*1000  : null;

  // === 1/3 octave pulsation ===
  const pDisc1_3 = harmonicsTo1_3Oct(d,'high');
  const pSuct1_3 = harmonicsTo1_3Oct(d,'low');

  // === Compare bar ===
  const cmpBar = allD.length>1 ? `
    <div class="cmpbar">
      <span style="font-family:var(--mono);font-size:.65rem;color:var(--tm);text-transform:uppercase;letter-spacing:1px;white-space:nowrap">Comparing</span>
      <div class="chips">${allD.map((f,i)=>`<div class="chip on"><span class="cdot" style="background:${CHIP[i]}"></span>${f.filename.replace('.txt','')}</div>`).join('')}</div>
      <label class="addbtn" onclick="fi.click()">+ Add</label>
    </div>` : '';

  // === HTML ===
  el.innerHTML = cmpBar + `
  <!-- HEADER -->
  <div class="rhdr">
    <div>
      <div class="rid"><span>${H(d,'Model')}</span></div>
      <div class="rdesc">${H(d,'Description')}</div>
      <div class="rmeta">
        ${mi('Test Type',H(d,'TestType'))} ${mi('Person',H(d,'Person'))}
        ${mi('Refrigerant',H(d,'Refrigerant').replace('.FLD',''))}
        ${mi('Comp. Type',H(d,'CompType'))} ${mi('Inverter',H(d,'Inverter'))}
        ${mi('Stroke Vol.',H(d,'StrokeVolume')+' cm³')} ${mi('Pole Pairs',H(d,'PolePairs'))}
        ${mi('Stability',H(d,'Stability')==='1'?'✓ OK':'⚠ NOK')}
        ${mi('Meas. windows',d.nM+' windows')}
      </div>
    </div>
    <div class="conds">
      ${cr('SP Tevap',H(d,'SP_Tevap')+' °C')} ${cr('SP Tcond',H(d,'SP_Tcond')+' °C')}
      ${cr('SP Speed',H(d,'SP_Speed')+' rpm')} ${cr('Speed (meas.)',F(speed,0)+' rpm')}
      ${cr('SP Voltage',H(d,'SP_Voltage')+'V / '+H(d,'SP_Frequency')+'Hz')}
      ${cr('Voltage (meas.)',F(voltage,2)+' V')} ${cr('Current',F(current,4)+' A')}
      ${cr('T_shell top',F(tShell,2)+' °C')} ${cr('T_suction',F(tSuct,2)+' °C')}
      ${cr('T_ambient',F(tAmb,2)+' °C')}
    </div>
  </div>

  <!-- KPIs -->
  <div class="kgrid">
    <div class="kcard"><span class="kl">Sound Power Lw</span><span class="kv c1">${F(Lw,2)}</span><span class="ku">dB(A)</span></div>
    <div class="kcard"><span class="kl">Sound Pressure Lp</span><span class="kv c3">${F(Lp,2)}</span><span class="ku">dB(A)</span></div>
    <div class="kcard"><span class="kl">Fund. Freq.</span><span class="kv c5">${F(fund,1)}</span><span class="ku">Hz</span></div>
    <div class="kcard"><span class="kl">Acc. Vector</span><span class="kv c4">${F(accVec,3)}</span><span class="ku">m/s²</span></div>
    <div class="kcard"><span class="kl">Puls. Discharge</span><span class="kv c2">${F(pHigh_mbar,3)}</span><span class="ku">mbar total</span></div>
    <div class="kcard"><span class="kl">Puls. Suction</span><span class="kv c6">${F(pLow_mbar,3)}</span><span class="ku">mbar total</span></div>
    <div class="kcard"><span class="kl">P_evap / P_cond</span><span class="kv" style="font-size:1rem;color:var(--td)">${F(pEvap,3)} / ${F(pCond,2)}</span><span class="ku">bar</span></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab(this,'t-noise')">🔊 Acoustics</button>
    <button class="tab" onclick="switchTab(this,'t-puls')">〰 Pulsation</button>
    <button class="tab" onclick="switchTab(this,'t-vib')">📳 Vibration</button>
    <button class="tab" onclick="switchTab(this,'t-ops')">⚙ Operating</button>
    ${allD.length>1?'<button class="tab" onclick="switchTab(this,\'t-cmp\')">⇄ Compare</button>':''}
  </div>

  <!-- ACOUSTICS PANEL -->
  <div class="panel active" id="t-noise">
    <div class="cgrid">
      <div class="cc cfull">
        <div class="ctit"><span><span class="cbar"></span>SOUND POWER LEVEL — MEASUREMENT WINDOWS</span><span style="color:var(--tm);font-size:.6rem">dB(A)</span></div>
        <div class="cwt"><canvas id="ch-lw"></canvas></div>
      </div>
    </div>
    <div class="tgrid">
      <div class="box">
        <div class="stit">// acoustic summary — window 1</div>
        <table class="dt">
          <tr><th>Parameter</th><th style="text-align:right">Value</th></tr>
          <tr><td>Sound Power Level Lw</td><td class="h1">${F(Lw,3)} dB(A)</td></tr>
          <tr><td>Sound Power Max Peak</td><td class="r">${F(LwPeak,3)} dB(A)</td></tr>
          <tr><td>Sound Pressure Lp</td><td class="r">${F(Lp,3)} dB(A)</td></tr>
          <tr><td>Fundamental Frequency</td><td class="r">${F(fund,3)} Hz</td></tr>
          <tr><td>Noise correction (LP)</td><td class="${H(d,'LP_Noise_Correction')==='1'?'ok':'nok'}">${H(d,'LP_Noise_Correction')==='1'?'Active':'Off'}</td></tr>
          <tr><td>Room correction</td><td class="${H(d,'Room_Correction')==='1'?'ok':'nok'}">${H(d,'Room_Correction')==='1'?'Active':'Off'}</td></tr>
          <tr><td>Oil separator</td><td class="${H(d,'OilSeparator')==='1'?'ok r':'r'}">${H(d,'OilSeparator')==='1'?'Yes':'No'}</td></tr>
        </table>
        <div style="margin-top:.8rem;padding:.6rem;background:var(--s2);border:1px solid var(--b2);font-family:var(--mono);font-size:.65rem;color:var(--tm)">
          ⓘ 1/3-octave band noise spectrum not available in CCS6 .txt — only total Lw is exported.
          The band values in the DB export come from the acoustic evaluation xlsm (CCS6 post-processing).
        </div>
      </div>
      <div class="box">
        <div class="stit">// operating points over time</div>
        <div style="height:220px"><canvas id="ch-ops-mini"></canvas></div>
      </div>
    </div>
  </div>

  <!-- PULSATION PANEL -->
  <div class="panel" id="t-puls">
    <div class="cgrid">
      <div class="cc cfull">
        <div class="ctit"><span><span class="cbar" style="background:var(--a2)"></span>PULSATION — 1/3 OCTAVE BAND (RSS of harmonics)</span><span style="color:var(--tm);font-size:.6rem">mbar</span></div>
        <div class="cwt"><canvas id="ch-p13"></canvas></div>
      </div>
    </div>
    <div class="cgrid">
      <div class="cc">
        <div class="ctit"><span><span class="cbar" style="background:var(--a2)"></span>DISCHARGE — HARMONICS O1–O30</span><span style="color:var(--tm);font-size:.6rem">mbar</span></div>
        <div class="cw"><canvas id="ch-ph"></canvas></div>
      </div>
      <div class="cc">
        <div class="ctit"><span><span class="cbar" style="background:var(--a3)"></span>SUCTION — HARMONICS O1–O30</span><span style="color:var(--tm);font-size:.6rem">mbar</span></div>
        <div class="cw"><canvas id="ch-pl"></canvas></div>
      </div>
    </div>
    <div class="tgrid">
      <div class="box">
        <div class="stit">// discharge pulsation — 1/3 octave [mbar]</div>
        <table class="dt">
          <tr><th>Band Hz</th><th style="text-align:right">mbar (RSS)</th><th>Band Hz</th><th style="text-align:right">mbar (RSS)</th></tr>
          ${THIRD_BANDS.slice(0,16).map((b,i)=>`
            <tr>
              <td>${THIRD_LABELS[i]}</td><td class="${pDisc1_3[i]>1?'h2':'r'}">${F(pDisc1_3[i],4)}</td>
              <td>${THIRD_LABELS[i+15]||'—'}</td><td class="${pDisc1_3[i+15]>1?'h2':'r'}">${THIRD_LABELS[i+15]?F(pDisc1_3[i+15],4):'—'}</td>
            </tr>`).join('')}
          <tr style="border-top:1px solid var(--b2)"><td colspan="2"><strong>Total</strong></td><td class="h2" colspan="2">${F(pHigh_mbar,4)} mbar</td></tr>
        </table>
      </div>
      <div class="box">
        <div class="stit">// suction pulsation — 1/3 octave [mbar]</div>
        <table class="dt">
          <tr><th>Band Hz</th><th style="text-align:right">mbar (RSS)</th><th>Band Hz</th><th style="text-align:right">mbar (RSS)</th></tr>
          ${THIRD_BANDS.slice(0,16).map((b,i)=>`
            <tr>
              <td>${THIRD_LABELS[i]}</td><td class="${pSuct1_3[i]>1?'h3':'r'}">${F(pSuct1_3[i],4)}</td>
              <td>${THIRD_LABELS[i+15]||'—'}</td><td class="${pSuct1_3[i+15]>1?'h3':'r'}">${THIRD_LABELS[i+15]?F(pSuct1_3[i+15],4):'—'}</td>
            </tr>`).join('')}
          <tr style="border-top:1px solid var(--b2)"><td colspan="2"><strong>Total</strong></td><td class="h3" colspan="2">${F(pLow_mbar,4)} mbar</td></tr>
        </table>
        <div style="margin-top:.8rem;padding:.5rem;background:var(--s2);border:1px solid var(--b2);font-family:var(--mono);font-size:.63rem;color:var(--tm)">
          ⓘ 1/3 oct bands computed via RSS of harmonics O1–O30 mapped by fundamental freq (${F(fund,2)} Hz).
          Total matches file value to within &lt;1%.
        </div>
      </div>
    </div>
  </div>

  <!-- VIBRATION PANEL -->
  <div class="panel" id="t-vib">
    <div class="cgrid">
      <div class="cc">
        <div class="ctit"><span><span class="cbar" style="background:var(--a4)"></span>ACC. VECTOR SUM — OVER WINDOWS</span><span style="color:var(--tm);font-size:.6rem">m/s²</span></div>
        <div class="cw"><canvas id="ch-vib"></canvas></div>
      </div>
      <div class="cc">
        <div class="ctit"><span><span class="cbar" style="background:var(--a4)"></span>PRESSURE RATIO — EVAP &amp; COND</span><span style="color:var(--tm);font-size:.6rem">bar</span></div>
        <div class="cw"><canvas id="ch-pr"></canvas></div>
      </div>
    </div>
    <div class="tgrid">
      <div class="box">
        <div class="stit">// vibration summary — window 1</div>
        <table class="dt">
          <tr><th>Parameter</th><th style="text-align:right">Value</th></tr>
          <tr><td>Acc. Vector Sum [m/s²]</td><td class="h1">${F(accVec,4)}</td></tr>
          <tr><td>Acc. Vector Max Peak [m/s²]</td><td class="r">${F(accPeak,4)}</td></tr>
          <tr><td>Force Vector Sum [N]</td><td class="r">${F(force,4)}</td></tr>
        </table>
        <div style="margin-top:.8rem;padding:.5rem;background:var(--s2);border:1px solid var(--b2);font-family:var(--mono);font-size:.63rem;color:var(--tm)">
          ⓘ Per-axis (X/Y/Z) and 1/3-octave band vibration spectra are not present in CCS6 .txt export —
          they come from the separate vibration analysis module (xlsm). Only vector sum is available here.
        </div>
      </div>
      <div class="box">
        <div class="stit">// vibration over all windows</div>
        <table class="dt">
          <tr><th>Window</th><th style="text-align:right">Acc.Vec [m/s²]</th><th style="text-align:right">Peak [m/s²]</th></tr>
          ${d.measurements.map((m,i)=>`
            <tr>
              <td>M${i+1}</td>
              <td class="r">${F(m['Acc. Vector Sum [m/s2]']?.avg,4)}</td>
              <td class="r">${F(m['Acc. Vector, Max Peak [m/s2]']?.avg,4)}</td>
            </tr>`).join('')}
        </table>
      </div>
    </div>
  </div>

  <!-- OPERATING PANEL -->
  <div class="panel" id="t-ops">
    <div class="tgrid">
      <div>
        <div class="box">
          <div class="stit">// set points vs measured — window 1</div>
          <table class="dt">
            <tr><th>Parameter</th><th style="text-align:right">Setpoint</th><th style="text-align:right">Measured</th><th style="text-align:right">Δ</th></tr>
            ${spRow('Tevap [°C]', parseFloat(H(d,'SP_Tevap')), G(d,'Tsuction'))}
            ${spRow('Tcond [bar→°C]', parseFloat(H(d,'SP_Tcond')), pCond, true)}
            ${spRow('Speed [rpm]', parseFloat(H(d,'SP_Speed')), speed)}
            ${spRow('Voltage [V]', parseFloat(H(d,'SP_Voltage')), voltage)}
            ${spRow('Frequency [Hz]', parseFloat(H(d,'SP_Frequency')), G(d,'SupplyFreq'))}
          </table>
        </div>
        <div class="box">
          <div class="stit">// measured values — window 1</div>
          <table class="dt">
            <tr><th>Parameter</th><th style="text-align:right">Value</th></tr>
            <tr><td>P_evap [bar]</td><td class="r">${F(pEvap,4)}</td></tr>
            <tr><td>P_cond [bar]</td><td class="r">${F(pCond,4)}</td></tr>
            <tr><td>P_abs High Side [bar]</td><td class="r">${F(G(d,'Abs. Pres. High Side [bar]'),4)}</td></tr>
            <tr><td>P_abs Low Side [bar]</td><td class="r">${F(G(d,'Abs. Pres. Low Side [bar]'),4)}</td></tr>
            <tr><td>Pressure Ratio [-]</td><td class="h5">${F(pCond&&pEvap?pCond/pEvap:null,3)}</td></tr>
            <tr><td>T_shell top [°C]</td><td class="r">${F(tShell,2)}</td></tr>
            <tr><td>T_suction [°C]</td><td class="r">${F(tSuct,2)}</td></tr>
            <tr><td>T_ambient [°C]</td><td class="r">${F(tAmb,2)}</td></tr>
            <tr><td>Current [A]</td><td class="r">${F(current,4)}</td></tr>
            <tr><td>Power [W]</td><td class="r">${F(power,1)}</td></tr>
            <tr><td>InvOutput Power [W]</td><td class="r">${F(G(d,'InverterOutput_Power'),2)}</td></tr>
            <tr><td>Flow [kg/s]</td><td class="r">${F(G(d,'Flow'),6)}</td></tr>
          </table>
        </div>
      </div>
      <div class="box" style="height:fit-content">
        <div class="stit">// all windows summary</div>
        <table class="dt">
          <tr><th>M#</th><th style="text-align:right">Speed</th><th style="text-align:right">Lw dB(A)</th><th style="text-align:right">Lp dB(A)</th><th style="text-align:right">T_shell</th><th style="text-align:right">P_hi mbar</th><th style="text-align:right">P_lo mbar</th></tr>
          ${d.measurements.map((m,i)=>`
            <tr>
              <td>M${i+1}</td>
              <td class="r">${F(m['Speed']?.avg,0)}</td>
              <td class="r">${F(m['Sound Power Level [dB(A)]']?.avg,2)}</td>
              <td class="r">${F(m['Sound Pressure [dB(A)]']?.avg,2)}</td>
              <td class="r">${F(m['Tshell_Top']?.avg,1)}</td>
              <td class="r">${F((m['Pres; Puls, High Side, total']?.avg||0)*1000,3)}</td>
              <td class="r">${F((m['Pres.  Puls., Low Side, total']?.avg||0)*1000,3)}</td>
            </tr>`).join('')}
        </table>
      </div>
    </div>
  </div>

  <!-- COMPARE PANEL -->
  ${allD.length>1?`<div class="panel" id="t-cmp">${renderCmp()}</div>`:''}

  <div class="footer">
    <span class="ft">COMPRESSOR ACOUSTIC REPORT · CCS6 direct parser · Generated ${new Date().toLocaleString()}</span>
    <span class="ft">${allD.length} file(s) · ${d.nM} measurement windows · fund ${F(fund,2)} Hz</span>
  </div>`;

  // ═══ CHARTS ═══
  const CD = {
    responsive:true, maintainAspectRatio:false,
    plugins:{
      legend:{display:false, labels:{color:'#64748b',font:{family:'IBM Plex Mono',size:10},boxWidth:10}},
      tooltip:{backgroundColor:'#181d23',borderColor:'#2a3340',borderWidth:1,
        titleColor:'#64748b',bodyColor:'#e2e8f0',
        titleFont:{family:'IBM Plex Mono',size:11},bodyFont:{family:'IBM Plex Mono',size:11}}
    },
    scales:{
      x:{ticks:{color:'#64748b',font:{family:'IBM Plex Mono',size:9},maxRotation:45},grid:{color:'#1e252e'},border:{color:'#1e252e'}},
      y:{ticks:{color:'#64748b',font:{family:'IBM Plex Mono',size:9}},grid:{color:'#1e252e'},border:{color:'#1e252e'}}
    }
  };

  const tLabels = allD[0].measurements.map((_,i)=>`M${i+1}`);

  // Lw time series
  charts.lw = new Chart(document.getElementById('ch-lw'),{
    type:'line', data:{labels:tLabels, datasets:allD.map((d,di)=>({
      label:d.filename, data:d.measurements.map(m=>m['Sound Power Level [dB(A)]']?.avg||null),
      borderColor:CHIP[di], backgroundColor:CHIP[di]+'18', borderWidth:di===0?2:1.5,
      pointRadius:3, tension:0.3, fill:di===0, spanGaps:true
    }))},
    options:{...CD, plugins:{...CD.plugins, legend:{display:allD.length>1, labels:{color:'#64748b',font:{family:'IBM Plex Mono',size:10}}}}}
  });

  // Ops mini (evap + cond pressure)
  charts.opsMini = new Chart(document.getElementById('ch-ops-mini'),{
    type:'line', data:{labels:tLabels, datasets:[
      {label:'P_evap [bar]', data:allD[0].measurements.map(m=>m['Pevap']?.avg||null), borderColor:'#00d4ff', borderWidth:2, pointRadius:2, tension:0.3, fill:false, spanGaps:true},
      {label:'P_cond [bar]', data:allD[0].measurements.map(m=>m['Pcond']?.avg||null), borderColor:'#ff6b35', borderWidth:2, pointRadius:2, tension:0.3, fill:false, spanGaps:true, yAxisID:'y2'}
    ]},
    options:{...CD, plugins:{...CD.plugins, legend:{display:true, labels:{color:'#64748b',font:{family:'IBM Plex Mono',size:9},boxWidth:8}}},
      scales:{...CD.scales, y2:{type:'linear',position:'right',ticks:{color:'#64748b',font:{family:'IBM Plex Mono',size:9}},grid:{display:false},border:{color:'#1e252e'}}}}
  });

  // Pulsation 1/3 oct both sides
  charts.p13 = new Chart(document.getElementById('ch-p13'),{
    type:'bar', data:{labels:THIRD_LABELS, datasets:allD.flatMap((d,di)=>[
      {label:d.filename+' Discharge', data:harmonicsTo1_3Oct(d,'high'), backgroundColor:CHIP[di]+'99', borderColor:CHIP[di], borderWidth:1, stack:`s${di}`},
    ]).concat(allD.map((d,di)=>({
      label:d.filename+' Suction', data:harmonicsTo1_3Oct(d,'low'), backgroundColor:CHIP[di]+'44', borderColor:CHIP[di]+'88', borderWidth:1, borderDash:[3,3], stack:`s${di}b`
    })))},
    options:{...CD, plugins:{...CD.plugins, legend:{display:true, labels:{color:'#64748b',font:{family:'IBM Plex Mono',size:9},boxWidth:8}}}}
  });

  // Harmonics discharge
  const hLabels = Array.from({length:30},(_,i)=>`O${i+1}`);
  charts.ph = new Chart(document.getElementById('ch-ph'),{
    type:'bar', data:{labels:hLabels, datasets:allD.map((d,di)=>({
      label:d.filename, data:Array.from({length:30},(_,i)=>(G(d,`Pres. Puls., High Side, O${i+1} [bar]`)||0)*1000),
      backgroundColor:CHIP[di]+'aa', borderColor:CHIP[di], borderWidth:1
    }))},
    options:{...CD, plugins:{...CD.plugins, legend:{display:allD.length>1, labels:{color:'#64748b',font:{family:'IBM Plex Mono',size:9}}}}}
  });

  // Harmonics suction
  charts.pl = new Chart(document.getElementById('ch-pl'),{
    type:'bar', data:{labels:hLabels, datasets:allD.map((d,di)=>({
      label:d.filename, data:Array.from({length:30},(_,i)=>(G(d,`Pres.  Puls., Low Side, O${i+1} [bar]`)||0)*1000),
      backgroundColor:CHIP[di]+'aa', borderColor:CHIP[di], borderWidth:1
    }))},
    options:{...CD, plugins:{...CD.plugins, legend:{display:allD.length>1, labels:{color:'#64748b',font:{family:'IBM Plex Mono',size:9}}}}}
  });

  // Vibration time series
  charts.vib = new Chart(document.getElementById('ch-vib'),{
    type:'line', data:{labels:tLabels, datasets:allD.map((d,di)=>({
      label:d.filename, data:d.measurements.map(m=>m['Acc. Vector Sum [m/s2]']?.avg||null),
      borderColor:CHIP[di], backgroundColor:CHIP[di]+'18', borderWidth:2, pointRadius:2, tension:0.3, fill:di===0, spanGaps:true
    }))},
    options:{...CD, plugins:{...CD.plugins, legend:{display:allD.length>1, labels:{color:'#64748b',font:{family:'IBM Plex Mono',size:9}}}}}
  });

  // Pressure ratio time series
  charts.pr = new Chart(document.getElementById('ch-pr'),{
    type:'line', data:{labels:tLabels, datasets:[
      {label:'P_cond', data:allD[0].measurements.map(m=>m['Pcond']?.avg||null), borderColor:'#ff6b35', borderWidth:2, pointRadius:2, tension:0.3, spanGaps:true},
      {label:'P_evap', data:allD[0].measurements.map(m=>m['Pevap']?.avg||null), borderColor:'#00d4ff', borderWidth:2, pointRadius:2, tension:0.3, spanGaps:true}
    ]},
    options:{...CD, plugins:{...CD.plugins, legend:{display:true, labels:{color:'#64748b',font:{family:'IBM Plex Mono',size:9},boxWidth:8}}}}
  });
}

// ═══ HELPERS ═══
function mi(l,v){return `<div class="mi"><span class="ml">${l}</span><span class="mv">${v||'—'}</span></div>`;}
function cr(l,v){return `<div class="crow"><span class="cl">${l}</span><span class="cv">${v}</span></div>`;}

function spRow(label, sp, meas, condOnly=false) {
  const delta = (meas!==null&&sp!==null) ? meas-sp : null;
  const cls = delta!==null && Math.abs(delta)>2 ? 'nok' : 'ok';
  return `<tr><td>${label}</td><td class="r">${F(sp,1)}</td><td class="r">${F(meas,2)}</td><td class="${cls}">${delta!==null?F(delta,2):'—'}</td></tr>`;
}

function switchTab(btn, id) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(id).classList.add('active');
  // Resize charts after tab switch
  setTimeout(()=>Object.values(charts).forEach(c=>c.resize()), 50);
}

function renderCmp() {
  const params = [
    {l:'Sound Power Lw [dB(A)]', fn:d=>G(d,'Sound Power Level [dB(A)]'), dec:3},
    {l:'Sound Pressure Lp [dB(A)]', fn:d=>G(d,'Sound Pressure [dB(A)]'), dec:3},
    {l:'Fund. Freq [Hz]', fn:d=>G(d,'Fundamental Freq. [Hz]'), dec:2},
    {l:'Acc. Vector Sum [m/s²]', fn:d=>G(d,'Acc. Vector Sum [m/s2]'), dec:4},
    {l:'Acc. Vector Peak [m/s²]', fn:d=>G(d,'Acc. Vector, Max Peak [m/s2]'), dec:4},
    {l:'Puls. Discharge Total [mbar]', fn:d=>(G(d,'Pres; Puls, High Side, total')||0)*1000, dec:4},
    {l:'Puls. Suction Total [mbar]', fn:d=>(G(d,'Pres.  Puls., Low Side, total')||0)*1000, dec:4},
    {l:'Speed [rpm]', fn:d=>G(d,'Speed'), dec:0},
    {l:'Voltage [V]', fn:d=>G(d,'Voltage'), dec:2},
    {l:'Current [A]', fn:d=>G(d,'Current'), dec:4},
    {l:'T_shell top [°C]', fn:d=>G(d,'Tshell_Top'), dec:2},
    {l:'T_suction [°C]', fn:d=>G(d,'Tsuction'), dec:2},
    {l:'P_evap [bar]', fn:d=>G(d,'Pevap'), dec:4},
    {l:'P_cond [bar]', fn:d=>G(d,'Pcond'), dec:4},
  ];
  return `<div style="overflow-x:auto;background:var(--s1);border:1px solid var(--b1);padding:1.3rem">
    <table class="dt">
      <thead><tr><th>Parameter</th>${allD.map((d,i)=>`<th style="color:${CHIP[i]}">${d.filename.replace('.txt','')}</th>`).join('')}</tr></thead>
      <tbody>${params.map(p=>`<tr><td style="color:var(--tx)">${p.l}</td>${allD.map((d,di)=>`<td style="color:${CHIP[di]};text-align:right">${F(p.fn(d),p.dec)}</td>`).join('')}</tr>`).join('')}</tbody>
    </table>
  </div>`;
}
</script>
</body>
</html>
